<style>
  :root{
    --navy:#0F172A; --navy-2:#111c33; --panel:#16223d; --panel-2:#1b2945;
    --cyan:#06B6D4; --violet:#7C3AED; --red:#EF4444; --green:#10B981; --amber:#F59E0B;
    --text:#E2E8F0; --muted:#94A3B8; --line:#26334f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
    --display:'Plus Jakarta Sans','Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 540px at 82% -12%,#16264a 0%,var(--navy) 55%);
       color:var(--text);font-family:var(--sans);min-height:100vh}
  a{color:var(--cyan);text-decoration:none}
  .contact-bar{background:#0b1324;color:var(--muted);font-size:12px;text-align:center;
       padding:6px;border-bottom:1px solid var(--line)}
  .contact-bar b{color:var(--cyan)}
  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
       padding:16px 28px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:13px}
  .brand .mark{width:40px;height:40px;filter:drop-shadow(0 0 14px rgba(6,182,212,.35))}
  .brand h1{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:.2px;margin:0}
  .brand .url{font-size:12px;color:var(--muted)}
  nav.tabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  nav.tabs button, nav.tabs a.nav-link{background:transparent;border:1px solid transparent;color:var(--muted);
       font-family:var(--sans);font-weight:600;font-size:13px;padding:9px 14px;border-radius:9px;cursor:pointer;transition:.18s}
  nav.tabs button.active, nav.tabs a.nav-link.active{color:#fff;background:var(--panel);border-color:var(--line)}
  nav.tabs button:hover, nav.tabs a.nav-link:hover{color:#fff}
  nav.tabs .nav-divider{width:1px;height:22px;background:var(--line);margin:0 2px}
  main{max-width:1180px;margin:0 auto;padding:30px 28px 80px}
  .hero{padding:14px 2px 8px;max-width:820px}
  .hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
       color:var(--cyan);margin-bottom:12px}
  .hero h2{font-family:var(--display);font-size:34px;line-height:1.12;font-weight:800;margin:0 0 12px;
       background:linear-gradient(120deg,#fff 30%,#bfe9f4 70%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-size:15px;line-height:1.65;color:var(--muted);margin:0;max-width:720px}
  @media(max-width:640px){.hero h2{font-size:26px}}
  h2.sec{font-family:var(--display);font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
       margin:34px 0 12px;font-weight:700}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:10px}
  .panel p{font-size:15px;line-height:1.65;color:var(--muted);margin:0 0 12px}
  .panel p:last-child{margin-bottom:0}
  .panel ul{margin:8px 0 0;padding-left:20px;color:var(--muted);line-height:1.7;font-size:15px}
  .panel li{margin-bottom:6px}
  .muted{color:var(--muted)}
  .caps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
  @media(max-width:900px){.caps{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.caps{grid-template-columns:1fr}}
  .cap-card{background:linear-gradient(180deg,var(--panel),var(--navy-2));border:1px solid var(--line);
       border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
  .cap-card::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--violet))}
  .cap-card h3{font-family:var(--display);font-size:16px;margin:0 0 8px;color:#fff}
  .cap-card p{font-size:14px;line-height:1.55;color:var(--muted);margin:0}
  .workflow{display:grid;gap:10px;margin:14px 0}
  .wf-step{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
       display:flex;align-items:center;gap:14px}
  .wf-step .num{font-family:var(--mono);font-size:12px;color:var(--cyan);width:28px;height:28px;border-radius:8px;
       border:1px solid rgba(6,182,212,.35);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .wf-step h3{margin:0;font-size:15px;font-weight:700}
  .wf-step p{margin:4px 0 0;font-size:13px;color:var(--muted)}
  .wf-arrow{text-align:center;color:var(--cyan);font-size:18px;line-height:1;margin:-2px 0}
  .input-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:760px){.input-grid{grid-template-columns:1fr}}
  .input-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .input-card h3{margin:0 0 8px;font-size:15px}
  .input-card p{margin:0;font-size:14px;line-height:1.55;color:var(--muted)}
  .faq details{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:10px}
  .faq summary{cursor:pointer;font-weight:600;font-size:15px;list-style:none}
  .faq summary::-webkit-details-marker{display:none}
  .faq p{margin:10px 0 0;font-size:14px;line-height:1.6;color:var(--muted)}
  .page-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--line);text-align:center}
  .page-footer p{font-size:14px;color:var(--muted);margin:0 0 8px;line-height:1.6}
  .pill{font-family:var(--sans);font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap;
       display:inline-block;margin-bottom:8px;background:rgba(124,58,237,.2);color:#c4b5fd}
</style>
